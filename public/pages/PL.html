	<!-- Redirect Script Start -->
	<script>
		<!--set/reset idle time-->
		(function() {
			let idleDurationSecs;    // X number of seconds
			let counter;    // X number of seconds
			const redirectUrl = '../index.html';  // Redirect idle users to this URL
			let idleTimeout; // variable to hold the timeout, do not modify
			let idleInterval;
			
			//console.log(timeout_config);
			
			idleDurationSecs = timeout_config.idleDurationSecs;
			counter = timeout_config.msg_counter;						
			const message = document.querySelector(".message");
			 

			const resetIdleTimeout = function() {						
				
				var x = document.getElementById("snackbar")
				// Clears the existing timeout
				if(idleTimeout)	clearTimeout(idleTimeout);

				if(idleInterval) {
					clearInterval(idleInterval);
					message.style.visibility = "hidden";
					x.className = "";
				}							

				// Set a new idle timeout to load the redirectUrl after idleDurationSecs
				idleTimeout = setTimeout(() =>{ 						    

				// Add the "show" class to DIV
				x.className = "show";
				setTimeout(function(){ x.className = x.className.replace("show", ""); }, counter * 1000);
				//const counter=4;
				message.style.visibility = "visible";
				//message = document.querySelector(".message"); 
				message.innerText = "Weiterleitung zur Startseite in ";//"Redirecting to the start page in ";
				message.insertAdjacentHTML("beforeend", "<span id='counter'>"+counter+"</span> Sekunden. Zum Abbrechen klicken/bewegen Sie die Maus.");
				idleInterval = setInterval(() =>{
				  var span = document.querySelector("#counter");
				  var count = span.textContent * 1 - 1;
				  span.textContent = count < 0 ? 0 : count;
				  if (count === 0) {
					window.location.replace("../index.html");
				  }
				 }, 1000);}
			, idleDurationSecs * 1000);
			};

			// Init on page load
			resetIdleTimeout();

			// Reset the idle timeout on any of the events listed below
			['click', 'touchstart', 'mousemove'].forEach(evt => 
				document.addEventListener(evt, resetIdleTimeout, false)
			);				
		})();
	</script>					
<!-- Redirect Script End -->
